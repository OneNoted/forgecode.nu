name: aur

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      publish_git:
        description: Publish forgecode-nu-git to AUR
        required: false
        default: false
        type: boolean
      publish_stable:
        description: Publish forgecode-nu to AUR
        required: false
        default: false
        type: boolean
      publish_ref:
        description: Full git ref to publish from (must stay refs/heads/main)
        required: false
        default: refs/heads/main
        type: string
      release_tag:
        description: Stable release tag to verify against packaging metadata (for example v0.1.0)
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    env:
      AUR_BUILDER_USER: aurbuilder
    steps:
      - name: Install Arch packaging tools
        run: pacman -Syu --noconfirm git namcap openssh rsync
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_ref || github.ref }}
      - name: Trust checkout as a git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Prepare non-root makepkg user
        run: |
          id -u "$AUR_BUILDER_USER" >/dev/null 2>&1 || useradd -m "$AUR_BUILDER_USER"
          chown -R "$AUR_BUILDER_USER:$AUR_BUILDER_USER" "$GITHUB_WORKSPACE"
      - name: Regenerate tracked .SRCINFO files
        run: |
          runuser -u "$AUR_BUILDER_USER" -- sh -lc \
            "cd '$GITHUB_WORKSPACE' && ./scripts/update-aur-srcinfo.sh"
      - name: Verify tracked metadata is committed
        run: git -C "$GITHUB_WORKSPACE" diff --exit-code -- packaging/aur
      - name: Validate PKGBUILDs
        run: ./scripts/check-aur-packages.sh
      - name: Verify stable PKGBUILD source syntax
        run: |
          runuser -u "$AUR_BUILDER_USER" -- sh -lc \
            "cd '$GITHUB_WORKSPACE/packaging/aur/forgecode-nu' && env CARCH=x86_64 makepkg --printsrcinfo >/dev/null"
      - name: Verify -git PKGBUILD source syntax
        run: |
          runuser -u "$AUR_BUILDER_USER" -- sh -lc \
            "cd '$GITHUB_WORKSPACE/packaging/aur/forgecode-nu-git' && env CARCH=x86_64 makepkg --printsrcinfo >/dev/null"

  publish-git:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_git && inputs.publish_ref == 'refs/heads/main')
    needs: validate
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
      AUR_PACKAGER_NAME: ${{ secrets.AUR_PACKAGER_NAME }}
      AUR_PACKAGER_EMAIL: ${{ secrets.AUR_PACKAGER_EMAIL }}
    steps:
      - name: Install publish dependencies
        run: pacman -Syu --noconfirm git openssh rsync
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_ref || github.ref }}
      - name: Trust checkout as a git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Verify AUR SSH key is configured
        run: |
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo 'AUR_SSH_PRIVATE_KEY is not configured' >&2
            exit 1
          fi
      - name: Configure SSH for AUR
        run: |
          AUR_SSH_DIR="${RUNNER_TEMP}/aur-ssh"
          install -dm700 "$AUR_SSH_DIR"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$AUR_SSH_DIR/id_ed25519"
          chmod 600 "$AUR_SSH_DIR/id_ed25519"
          cp "$GITHUB_WORKSPACE/.github/aur_known_hosts" "$AUR_SSH_DIR/known_hosts"
          echo "GIT_SSH_COMMAND=ssh -i '$AUR_SSH_DIR/id_ed25519' -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile='$AUR_SSH_DIR/known_hosts'" >> "$GITHUB_ENV"
      - name: Publish forgecode-nu-git
        run: ./scripts/publish-aur-package.sh forgecode-nu-git ssh://aur@aur.archlinux.org/forgecode-nu-git.git

  publish-stable:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.publish_stable &&
      inputs.publish_ref == 'refs/heads/main' &&
      startsWith(inputs.release_tag, 'v')
    needs: validate
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
      AUR_PACKAGER_NAME: ${{ secrets.AUR_PACKAGER_NAME }}
      AUR_PACKAGER_EMAIL: ${{ secrets.AUR_PACKAGER_EMAIL }}
    steps:
      - name: Install publish dependencies
        run: pacman -Syu --noconfirm git openssh rsync grep
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.publish_ref }}
      - name: Trust checkout as a git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Verify stable PKGBUILD is release-ready
        run: |
          if grep -q "sha256sums=('SKIP')" packaging/aur/forgecode-nu/PKGBUILD; then
            echo 'forgecode-nu PKGBUILD still uses SKIP; update the release checksum before publishing stable AUR metadata' >&2
            exit 1
          fi
      - name: Verify release tag matches tracked stable metadata
        run: |
          if ! git rev-parse -q --verify "refs/tags/${{ inputs.release_tag }}" >/dev/null; then
            echo "Release tag ${{ inputs.release_tag }} does not exist in the checked-out repository" >&2
            exit 1
          fi
          pkgver=$(sed -n "s/^pkgver=//p" packaging/aur/forgecode-nu/PKGBUILD | head -n1)
          tag=${{ inputs.release_tag }}
          if [ "v${pkgver}" != "${tag}" ]; then
            echo "PKGBUILD pkgver ${pkgver} does not match release tag ${tag}" >&2
            exit 1
          fi
      - name: Verify AUR SSH key is configured
        run: |
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo 'AUR_SSH_PRIVATE_KEY is not configured' >&2
            exit 1
          fi
      - name: Configure SSH for AUR
        run: |
          AUR_SSH_DIR="${RUNNER_TEMP}/aur-ssh"
          install -dm700 "$AUR_SSH_DIR"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$AUR_SSH_DIR/id_ed25519"
          chmod 600 "$AUR_SSH_DIR/id_ed25519"
          cp "$GITHUB_WORKSPACE/.github/aur_known_hosts" "$AUR_SSH_DIR/known_hosts"
          echo "GIT_SSH_COMMAND=ssh -i '$AUR_SSH_DIR/id_ed25519' -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile='$AUR_SSH_DIR/known_hosts'" >> "$GITHUB_ENV"
      - name: Publish forgecode-nu
        run: ./scripts/publish-aur-package.sh forgecode-nu ssh://aur@aur.archlinux.org/forgecode-nu.git
